<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-api-token"
      data-l10n-id="pref-api-token"
    ></html:label>
    <html:input
      type="password"
      id="zotero-prefpane-__addonRef__-api-token"
      preference="apiToken"
      style="flex: 1; min-width: 250px"
    ></html:input>
  </hbox>

  <hbox>
    <button
      id="zotero-prefpane-__addonRef__-test-connection"
      data-l10n-id="pref-test-connection"
    />
  </hbox>

  <separator class="thin" />

  <checkbox
    id="zotero-prefpane-__addonRef__-auto-sync-enabled"
    preference="autoSyncEnabled"
    data-l10n-id="pref-auto-sync-enabled"
  />

  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-auto-sync-interval"
      data-l10n-id="pref-auto-sync-interval"
    ></html:label>
    <menulist
      id="zotero-prefpane-__addonRef__-auto-sync-interval"
      preference="autoSyncInterval"
    >
      <menupopup>
        <menuitem label="5" value="5" />
        <menuitem label="15" value="15" />
        <menuitem label="30" value="30" />
        <menuitem label="60" value="60" />
      </menupopup>
    </menulist>
  </hbox>

  <checkbox
    id="zotero-prefpane-__addonRef__-show-sync-notifications"
    preference="showSyncNotifications"
    data-l10n-id="pref-show-sync-notifications"
  />

  <separator class="thin" />

  <hbox>
    <button
      id="zotero-prefpane-__addonRef__-sync-now"
      data-l10n-id="pref-sync-now"
    />
    <button
      id="zotero-prefpane-__addonRef__-full-resync"
      data-l10n-id="pref-full-resync"
    />
  </hbox>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
